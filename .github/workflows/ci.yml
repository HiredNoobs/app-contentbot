name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: python:3.14.3-slim-trixie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install --no-install-recommends -y \
            gcc \
            build-essential
          rm -rf /var/lib/apt/lists/*

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install project with dev extras
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --cov=contentbot --cov-report=html --cov-fail-under=20

      - name: Run mypy
        run: |
          mypy --install-types --non-interactive contentbot

      - name: Run flake8
        run: |
          flake8 contentbot tests
